<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bagiWatt — Monitoring Listrik Rumah</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#4f46e5;--primary-h:#4338ca;--primary-lt:#eef2ff;
  --green:#10b981;--amber:#f59e0b;--red:#ef4444;
  --s50:#f8fafc;--s100:#f1f5f9;--s200:#e2e8f0;--s300:#cbd5e1;
  --s400:#94a3b8;--s500:#64748b;--s600:#475569;--s700:#334155;--s800:#1e293b;--s900:#0f172a;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--s50);color:var(--s800);line-height:1.55;font-size:14px}
button{cursor:pointer;font-family:inherit}input,select{font-family:inherit}
/* Layout */
.app-shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:256px;background:#fff;border-right:1px solid var(--s100);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-logo{padding:18px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--s100)}
.logo-icon{background:var(--primary);padding:8px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.sidebar-nav{flex:1;padding:12px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;color:var(--s500);border:none;background:none;width:100%;text-align:left;transition:all .15s}
.nav-item:hover{background:var(--s50);color:var(--s800)}
.nav-item.active{background:var(--primary-lt);color:var(--primary)}
.nav-item svg{flex-shrink:0}
.sidebar-footer{padding:12px;border-top:1px solid var(--s100)}
.user-info{display:flex;align-items:center;gap:10px;padding:8px;margin-bottom:8px}
.user-avatar{width:34px;height:34px;background:var(--primary-lt);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--primary);flex-shrink:0}
.user-name{font-size:13px;font-weight:600;color:var(--s800)}
.user-email{font-size:11px;color:var(--s400)}
.app-body{flex:1;display:flex;flex-direction:column;overflow:hidden}
.mob-header{display:none;background:#fff;border-bottom:1px solid var(--s100);padding:12px 16px;align-items:center;justify-content:space-between;flex-shrink:0}
.mob-logo{display:flex;align-items:center;gap:8px;font-weight:700;color:var(--s900)}
.app-main{flex:1;overflow-y:auto;padding:24px 28px;background:linear-gradient(135deg,var(--s50) 0%,#eef2ff22 100%)}
@media(max-width:768px){.sidebar{display:none}.mob-header{display:flex}.app-main{padding:16px}}
/* Cards */
.card{background:#fff;border:1px solid var(--s200);border-radius:14px;overflow:hidden}
.card-header{padding:16px 20px 10px}
.card-title{font-weight:600;color:var(--s800);font-size:15px;display:flex;align-items:center;gap:8px}
.card-desc{color:var(--s500);font-size:12px;margin-top:3px}
.card-content{padding:16px 20px}
/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:14px;font-weight:500;border:none;cursor:pointer;transition:all .15s;line-height:1}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-h)}
.btn-outline{background:transparent;color:var(--s700);border:1px solid var(--s200)}.btn-outline:hover{background:var(--s50)}
.btn-ghost{background:transparent;color:var(--s600)}.btn-ghost:hover{background:var(--s100)}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{background:#dc2626}
.btn-red-ghost{background:transparent;color:var(--red);border:1px solid #fecaca}.btn-red-ghost:hover{background:#fef2f2}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px}.btn-lg{padding:12px 28px;font-size:15px;border-radius:10px}.btn-block{width:100%}.btn-icon{padding:6px;border-radius:6px}
/* Forms */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;font-weight:500;color:var(--s700);margin-bottom:5px}
.form-label .opt{font-weight:400;color:var(--s400);margin-left:4px}
.form-input,.form-select{width:100%;padding:8px 12px;border:1px solid var(--s200);border-radius:8px;font-size:14px;color:var(--s800);background:#fff;outline:none;transition:border-color .15s}
.form-input:focus,.form-select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.form-input:disabled{background:var(--s50);color:var(--s500)}
.g2cols{display:grid;grid-template-columns:1fr 1fr;gap:12px}
/* Badges */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;border:1px solid transparent}
.badge-active{background:#dcfce7;color:#15803d;border-color:#bbf7d0}
.badge-inactive{background:var(--s100);color:var(--s500);border-color:var(--s200)}
.badge-pending{background:#fef3c7;color:#b45309;border-color:#fde68a}
.badge-indigo{background:var(--primary-lt);color:var(--primary);border-color:#c7d2fe}
.badge-red{background:#fee2e2;color:#991b1b;border-color:#fecaca}
.badge-orange{background:#ffedd5;color:#9a3412;border-color:#fed7aa}
.badge-blue{background:#dbeafe;color:#1e40af;border-color:#bfdbfe}
.badge-purple{background:#ede9fe;color:#5b21b6;border-color:#ddd6fe}
.badge-yellow{background:#fef9c3;color:#854d0e;border-color:#fde68a}
.badge-cyan{background:#cffafe;color:#155e75;border-color:#a5f3fc}
.badge-gray{background:var(--s100);color:var(--s700);border-color:var(--s200)}
.badge-emerald{background:#d1fae5;color:#065f46;border-color:#a7f3d0}
/* Tables */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{padding:10px 14px;text-align:left;color:var(--s500);font-weight:500;background:var(--s50);font-size:12px}
.tbl th:first-child{border-radius:8px 0 0 8px}.tbl th:last-child{border-radius:0 8px 8px 0}
.tbl td{padding:12px 14px;border-top:1px solid var(--s100);color:var(--s700)}
.tbl tr:hover td{background:#fafafa}
/* Modal */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(15,23,42,.4);display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:#fff;border-radius:16px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-header{padding:18px 20px 12px;border-bottom:1px solid var(--s100);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-weight:700;font-size:15px}
.modal-body{padding:20px}
/* Mobile drawer */
.mob-drawer-wrap{position:fixed;inset:0;z-index:100;display:flex}
.mob-overlay{position:absolute;inset:0;background:rgba(15,23,42,.35);backdrop-filter:blur(4px)}
.mob-panel{position:relative;width:280px;background:#fff;display:flex;flex-direction:column;height:100%}
/* Utils */
.section-header{margin-bottom:20px}
.section-title{font-size:20px;font-weight:700;color:var(--s900)}
.section-sub{color:var(--s500);font-size:13px;margin-top:3px}
.flex{display:flex}.flex-col{flex-direction:column}.flex-wrap{flex-wrap:wrap}
.items-center{align-items:center}.items-start{align-items:flex-start}
.justify-between{justify-content:space-between}.justify-center{justify-content:center}
.flex-1{flex:1}.shrink-0{flex-shrink:0}
.gap-1{gap:4px}.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}
.grid{display:grid}
.g2{grid-template-columns:repeat(2,1fr);gap:16px}
.g3{grid-template-columns:repeat(3,1fr);gap:16px}
.g4{grid-template-columns:repeat(4,1fr);gap:16px}
.gcol12{grid-template-columns:1fr 2fr;gap:24px}
@media(max-width:900px){.g4{grid-template-columns:repeat(2,1fr)}.gcol12{grid-template-columns:1fr}}
@media(max-width:600px){.g2,.g3,.g4{grid-template-columns:1fr}.g2cols{grid-template-columns:1fr}}
.space-y>*+*{margin-top:12px}.space-yl>*+*{margin-top:20px}
.mt-1{margin-top:4px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}
.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}
.p-3{padding:12px}.p-4{padding:16px}
.rounded{border-radius:8px}.rounded-xl{border-radius:16px}.rounded-full{border-radius:99px}
.text-xs{font-size:11px}.text-sm{font-size:13px}.text-2xl{font-size:22px}
.font-bold{font-weight:700}.font-semibold{font-weight:600}
.text-muted{color:var(--s500)}.text-primary{color:var(--primary)}.text-white{color:#fff}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.border-t{border-top:1px solid var(--s100)}
.hidden{display:none!important}
/* Charts */
.bar-chart-wrap{display:flex;flex-direction:column;padding:0 4px}
.bar-chart-bars{display:flex;align-items:flex-end;gap:6px;height:160px}
.bar-col{display:flex;flex-direction:column;align-items:center;flex:1;height:100%;justify-content:flex-end;gap:3px}
.bar-col-val{font-size:10px;color:var(--s400)}
.bar-fill{width:100%;border-radius:5px 5px 0 0}
.bar-chart-labels{display:flex;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--s100)}
.bar-lbl{flex:1;text-align:center;font-size:11px;color:var(--s500)}
.donut-wrap{display:flex;flex-direction:column;align-items:center;gap:14px}
.donut-circle{position:relative;display:flex;align-items:center;justify-content:center}
.donut-inner{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center}
.donut-legend{display:flex;flex-wrap:wrap;gap:6px 14px;justify-content:center}
.legend-dot{display:inline-block;width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:2px}
/* Device items */
.device-item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border:1px solid var(--s100);border-radius:12px;transition:all .15s;gap:8px}
.device-item:hover{background:var(--s50)}.device-item.inactive{opacity:.65;background:var(--s50)}
.device-actions{display:flex;gap:4px;flex-shrink:0}
.btn-tog-on{background:transparent;color:#15803d;border:none;padding:5px;border-radius:6px;cursor:pointer}
.btn-tog-on:hover{background:#dcfce7}
.btn-tog-off{background:transparent;color:var(--s400);border:none;padding:5px;border-radius:6px;cursor:pointer}
.btn-tog-off:hover{background:var(--s100)}
.btn-del{background:transparent;color:#f87171;border:none;padding:5px;border-radius:6px;cursor:pointer}
.btn-del:hover{background:#fef2f2;color:var(--red)}
/* Info boxes */
.info-box{display:flex;gap:8px;padding:10px 12px;border-radius:8px;font-size:12px;align-items:flex-start}
.info-blue{background:#eff6ff;border:1px solid #dbeafe;color:#1e40af}
.info-indigo{background:var(--primary-lt);border:1px solid #c7d2fe;color:#3730a3}
/* Score */
.score-card{background:linear-gradient(160deg,#4f46e5 0%,#3730a3 100%);color:#fff;border-radius:14px;padding:24px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:12px}
.score-num{font-size:52px;font-weight:800;line-height:1}
.prog-bar{width:100%;height:8px;background:rgba(255,255,255,.2);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:#4ade80;border-radius:4px}
/* Top card */
.top-card{padding:16px;border:1px solid var(--s100);border-radius:12px;background:#fff;display:flex;flex-direction:column;gap:10px}
.rank-badge{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0}
.stat-row{display:flex;justify-content:space-between;font-size:13px;padding-top:8px;border-top:1px solid var(--s100)}
/* Landing */
.landing{background:#fff;min-height:100vh}
.landing-nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--s100);padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.lmax{max-width:1100px;margin:0 auto;padding:0 24px}
.hero{padding:64px 0 48px;display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center}
@media(max-width:768px){.hero{grid-template-columns:1fr;gap:28px}}
.hero-title{font-size:44px;font-weight:800;line-height:1.1;color:var(--s900);margin-bottom:16px}
@media(max-width:600px){.hero-title{font-size:30px}}
.hero-sub{color:var(--s500);font-size:15px;line-height:1.6;max-width:420px;margin-bottom:24px}
.stat-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:20px}
.stat-chip{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--s50);border:1px solid var(--s100);border-radius:99px;font-size:12px;color:var(--s600)}
.hero-img-box{aspect-ratio:4/3;background:var(--primary-lt);border-radius:28px;overflow:hidden;box-shadow:0 20px 60px rgba(79,70,229,.15);position:relative}
.hero-img-box img{width:100%;height:100%;object-fit:cover}
.float-badge{position:absolute;bottom:16px;left:16px;background:rgba(255,255,255,.97);padding:12px 14px;border-radius:14px;box-shadow:0 8px 24px rgba(0,0,0,.15);display:flex;align-items:center;gap:10px}
.float-icon{background:#dcfce7;padding:8px;border-radius:50%;display:flex}
.feat-grid{margin-top:72px}
.feat-card{background:#fff;padding:24px;border-radius:24px;border:1px solid var(--s100);box-shadow:0 2px 8px rgba(0,0,0,.04);transition:all .2s}
.feat-card:hover{box-shadow:0 8px 24px rgba(0,0,0,.08);transform:translateY(-2px)}
.feat-icon{width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.cta-banner{margin:64px 0 24px;background:linear-gradient(135deg,var(--primary) 0%,#2563eb 100%);border-radius:24px;padding:48px 32px;text-align:center;color:#fff;box-shadow:0 12px 40px rgba(79,70,229,.3)}
.land-footer{border-top:1px solid var(--s100);padding:24px;text-align:center;font-size:12px;color:var(--s400)}
/* Login */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--primary-lt) 0%,#fff 50%,#dbeafe 100%);padding:16px}
.login-back-btn{position:fixed;top:20px;left:20px;display:flex;align-items:center;gap:6px;font-size:13px;color:var(--s500);cursor:pointer;border:none;background:none}
.login-back-btn:hover{color:var(--primary)}
.login-card{background:#fff;border-radius:16px;border:1px solid var(--s200);box-shadow:0 20px 60px rgba(0,0,0,.12);width:100%;max-width:400px}
.login-hdr{padding:24px 24px 16px}
.login-bdy{padding:0 24px 24px}
.pw-wrap{position:relative}
.pw-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--s400);cursor:pointer;padding:2px;display:flex}
.pw-toggle:hover{color:var(--s600)}
.err-box{padding:10px 12px;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;color:#991b1b;font-size:12px;margin-bottom:12px}
.demo-note{margin-top:16px;padding:10px 12px;background:var(--s50);border:1px solid var(--s100);border-radius:10px;text-align:center;font-size:11px;color:var(--s500)}
</style>
</head>
<body>
<div id="root"></div>
<div id="modal-wrap" class="hidden">
  <div class="modal-overlay">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title" id="modal-title"></span>
        <button class="btn btn-ghost btn-icon" id="modal-close-btn">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>
</div>
<div id="mob-drawer-wrap" class="hidden">
  <div class="mob-drawer-wrap">
    <div class="mob-overlay" id="mob-overlay"></div>
    <div class="mob-panel">
      <div class="sidebar-logo" style="padding:16px 18px">
        <div class="logo-icon" style="padding:7px">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        </div>
        <div>
          <div style="font-weight:700;font-size:15px;color:var(--s900)">bagiWatt</div>
          <div style="font-size:11px;color:var(--s400)">Monitoring Listrik</div>
        </div>
      </div>
      <nav id="mob-nav" style="flex:1;padding:10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto"></nav>
      <div style="padding:12px;border-top:1px solid var(--s100)">
        <div id="mob-user" class="user-info"></div>
        <button class="btn btn-red-ghost btn-block btn-sm" id="mob-logout-btn" style="justify-content:flex-start;gap:8px">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Keluar
        </button>
      </div>
    </div>
  </div>
</div>

    trending:'<polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>',

var S = { page:'landing', section:'dashboard', user:null, devices:[], logs:[], tokens:[] };

function saveState() {
  if(S.user) localStorage.setItem('bw_user', JSON.stringify(S.user));
  localStorage.setItem('bw_devices', JSON.stringify(S.devices));
  localStorage.setItem('bw_logs',    JSON.stringify(S.logs));
  localStorage.setItem('bw_tokens',  JSON.stringify(S.tokens));
}
function loadState() {
  var u = localStorage.getItem('bw_user');
  S.user = u ? JSON.parse(u) : null;
  var d = localStorage.getItem('bw_devices');
  S.devices = d ? JSON.parse(d) : DEMO_DEVICES.map(function(x){ return Object.assign({},x); });
  var l = localStorage.getItem('bw_logs');
  S.logs = l ? JSON.parse(l) : DEMO_LOGS.map(function(x){ return Object.assign({},x); });
  var t = localStorage.getItem('bw_tokens');
  S.tokens = t ? JSON.parse(t) : DEMO_TOKENS.map(function(x){ return Object.assign({},x); });
  S.page = S.user ? 'app' : 'landing';
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtRp(n) { return 'Rp '+Math.round(n).toLocaleString('id-ID'); }
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function todayStr() { return new Date().toISOString().slice(0,10); }
function shortDate(d) { return new Date(d+'T00:00:00').toLocaleDateString('id-ID',{day:'numeric',month:'short'}); }
function weekdayShort(d) { return new Date(d+'T00:00:00').toLocaleDateString('id-ID',{weekday:'short'}); }
function q(id) { return document.getElementById(id); }
function qv(id) { var el=q(id); return el?el.value:''; }

// ═══════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════
function htmlDashboard() {
  var cm = todayStr().slice(0,7);
  var ml = S.logs.filter(function(l){return l.date.startsWith(cm);});
  var mkwh   = ml.reduce(function(s,l){return s+l.totalKwh;},0);
  var mcarb  = ml.reduce(function(s,l){return s+l.carbonEmission;},0);
  var mcost  = mkwh * COST_PER_KWH;
  var totDev = S.devices.length;
  var actDev = S.devices.filter(function(d){return d.status==='active';}).length;

  // 7-day bars
  var today = new Date();
  var days7 = []; for(var i=0;i<7;i++){var d=new Date(today);d.setDate(d.getDate()-(6-i));days7.push(d.toISOString().slice(0,10));}
  var wdata = days7.map(function(date){
    var kwh = S.logs.filter(function(l){return l.date===date;}).reduce(function(s,l){return s+l.totalKwh;},0);
    return {date:date, label:weekdayShort(date), kwh:parseFloat(kwh.toFixed(2))};
  });
  var maxK = Math.max.apply(null, wdata.map(function(d){return d.kwh;}).concat([1]));

  // Donut
  var catCount = {};
  S.devices.filter(function(d){return d.status==='active';}).forEach(function(d){catCount[d.category]=(catCount[d.category]||0)+1;});
  var pieData = Object.keys(catCount).map(function(k){return {n:k,v:catCount[k]};});
  var totalPie = pieData.reduce(function(s,p){return s+p.v;},0);
  var angle=0, gradient='';
  if(totalPie>0){
    gradient = pieData.map(function(p,i){
      var deg=(p.v/totalPie)*360;
      var seg=COLORS[i%COLORS.length]+' '+angle+'deg '+(angle+deg)+'deg';
      angle+=deg; return seg;
    }).join(',');
  }

  var top5 = S.devices.filter(function(d){return d.status==='active';})
    .sort(function(a,b){return b.wattage-a.wattage;}).slice(0,5);

  return '<div class="space-yl">'
    +'<div class="section-header"><h2 class="section-title">Dashboard</h2><p class="section-sub">Ringkasan konsumsi energi Anda bulan ini.</p></div>'
    +'<div class="grid g4">'
    +sumCard(ico('zap',16),'#fff7ed','#ea580c','Estimasi Biaya / Bulan',fmtRp(mcost),'Berdasarkan '+ml.length+' log bulan ini')
    +sumCard(ico('activity',16),'#eef2ff','#4f46e5','Pemakaian / Bulan',mkwh.toFixed(1)+' kWh','Total kWh dari log tercatat')
    +sumCard(ico('leaf',16),'#f0fdf4','#16a34a','Jejak Karbon',mcarb.toFixed(1)+' kg CO₂','Emisi karbon bulan ini')
    +sumCard(ico('device',16),'#eff6ff','#2563eb','Perangkat',actDev+' <span style="font-size:14px;font-weight:400;color:var(--s500)">aktif</span>','Dari total '+totDev+' perangkat')
    +'</div>'
    +'<div class="grid g2">'
    // Bar chart
    +'<div class="card"><div class="card-header"><div class="flex justify-between items-center">'
    +'<div><div class="card-title">Tren Pemakaian 7 Hari</div><div class="card-desc">Total kWh per hari dari log tercatat</div></div>'
    +'<span style="color:#a5b4fc">'+ico('trending',20)+'</span></div></div>'
    +'<div class="card-content"><div class="bar-chart-wrap"><div class="bar-chart-bars">'
    +wdata.map(function(d){
      return '<div class="bar-col">'
        +'<div class="bar-col-val">'+(d.kwh>0?d.kwh.toFixed(1):'')+'</div>'
        +'<div class="bar-fill" style="height:'+Math.max((d.kwh/maxK)*155,2)+'px;background:'+(d.kwh>0?'#4f46e5':'#e2e8f0')+'" title="'+d.label+': '+d.kwh+' kWh"></div>'
        +'</div>';
    }).join('')
    +'</div><div class="bar-chart-labels">'
    +wdata.map(function(d){return '<div class="bar-lbl">'+d.label+'</div>';}).join('')
    +'</div></div></div></div>'
    // Donut
    +'<div class="card"><div class="card-header"><div class="card-title">Distribusi Kategori Perangkat</div><div class="card-desc">Jumlah perangkat aktif per kategori</div></div>'
    +'<div class="card-content flex justify-center">'
    +(pieData.length>0
      ?'<div class="donut-wrap">'
        +'<div class="donut-circle" style="width:160px;height:160px">'
        +'<div style="width:160px;height:160px;border-radius:50%;background:conic-gradient('+gradient+')"></div>'
        +'<div class="donut-inner"><span style="font-size:22px;font-weight:700;color:var(--s800)">'+totalPie+'</span><span style="font-size:11px;color:var(--s500)">perangkat</span></div>'
        +'</div>'
        +'<div class="donut-legend">'
        +pieData.map(function(p,i){
          return '<div class="flex items-center gap-1"><span class="legend-dot" style="background:'+COLORS[i%COLORS.length]+'"></span><span style="font-size:12px;color:var(--s600)">'+esc(p.n)+' ('+p.v+')</span></div>';
        }).join('')
        +'</div></div>'
      :'<div style="padding:40px 0;color:var(--s400);font-size:13px;text-align:center">Belum ada perangkat aktif</div>'
    )+'</div></div>'
    +'</div>'
    +(top5.length>0

function onDevType(val) {
  var wrap = q('dev-custom-wrap'), info = q('dev-preset-info'), txt = q('dev-preset-txt'), wEl = q('dev-watt');
  if(val==='custom'){wrap.classList.remove('hidden');info.classList.add('hidden');if(wEl)wEl.value='';}
  else if(val&&PRESETS[val]){
    wrap.classList.add('hidden');
    if(wEl) wEl.value=PRESETS[val].w;
    txt.innerHTML='Daya <strong>'+PRESETS[val].w+' W</strong> adalah referensi untuk <strong>'+esc(val)+'</strong>. Sesuaikan jika berbeda.';
    info.classList.remove('hidden');
  } else {wrap.classList.add('hidden');info.classList.add('hidden');}
}

function renderDeviceList() {
  var c = q('device-list-container'); if(!c) return;
  var srch = (qv('dev-search')||'').toLowerCase();
  var filt = qv('dev-filter')||'';
  var list = S.devices.filter(function(d){
    return (d.name.toLowerCase().includes(srch)||(d.brand||'').toLowerCase().includes(srch))
      && (!filt||d.category===filt);
  });
  if(list.length===0){
    c.innerHTML='<div class="card"><div class="card-content" style="text-align:center;padding:40px;color:var(--s400)">'
      +ico('device',40)+'<div style="margin-top:10px;font-weight:500">Tidak ada perangkat ditemukan</div>'
      +'<div style="font-size:12px;margin-top:4px">Coba ubah filter atau kata kunci</div></div></div>';
    return;
  }
  c.innerHTML='<div class="card"><div class="card-header"><div class="card-title">Daftar Perangkat</div>'
    +'<div class="card-desc">Total '+list.length+' perangkat</div></div>'
    +'<div class="card-content space-y">'
    +list.map(function(d){
      var isAct = d.status==='active';
      var catIco = CAT_ICO[d.category]||'laptop';
      var catBdg = CAT_BADGE[d.category]||'badge-gray';
      return '<div class="device-item'+(isAct?'',' inactive')+'">'
        +'<div class="flex items-start gap-3 flex-1" style="min-width:0">'
        +'<div style="padding:8px;border-radius:10px;flex-shrink:0;background:'+(isAct?'#eef2ff':'var(--s100)')+';color:'+(isAct?'#4f46e5':'var(--s400)')+'">'+ico(catIco,16)+'</div>'
        +'<div style="flex:1;min-width:0">'
        +'<div class="flex flex-wrap items-center gap-1" style="margin-bottom:3px">'
        +'<span style="font-weight:600;color:var(--s900)">'+esc(d.name)+(d.year?' <span style="color:var(--s400);font-weight:400">('+d.year+')</span>':'')+'</span>'
        +' <span class="badge '+catBdg+'">'+esc(d.category)+'</span>'
        +' <span class="badge '+(isAct?'badge-active':'badge-inactive')+'">'+(isAct?'Aktif':'Nonaktif')+'</span>'
        +'</div>'
        +'<div style="font-size:12px;color:var(--s500)">'
        +(d.brand&&d.brand!=='Unbranded'?esc(d.brand)+(d.model&&d.model!=='Unknown'?' '+esc(d.model):'')+'  &nbsp;·&nbsp; ':'')
        +'<strong style="color:var(--s700)">'+d.wattage+' W</strong> &nbsp;·&nbsp; <strong style="color:var(--s700)">'+d.hoursPerDay+' jam/hari</strong>'
        +'</div></div></div>'
        +'<div class="device-actions">'
        +'<button class="'+(isAct?'btn-tog-on':'btn-tog-off')+'" onclick="toggleDevice(\''+d.id+'\')" title="'+(isAct?'Nonaktifkan':'Aktifkan')+'">'+ico(isAct?'power':'poweroff',16)+'</button>'
        +'<button class="btn-del" onclick="deleteDevice(\''+d.id+'\')" title="Hapus">'+ico('trash',16)+'</button>'
        +'</div></div>';
    }).join('')
    +'</div></div>';
}

function htmlLogs() {
  var actDev = S.devices.filter(function(d){return d.status==='active';});
  var byDate = {};
  S.logs.forEach(function(l){byDate[l.date]=(byDate[l.date]||0)+l.totalKwh;});
  var chartData = Object.keys(byDate).sort().slice(-7).map(function(date){
    return {label:shortDate(date), kwh:parseFloat(byDate[date].toFixed(2))};
  });
  var maxK = Math.max.apply(null, chartData.map(function(d){return d.kwh;}).concat([1]));

  return '<div class="space-yl">'
    +'<div class="section-header"><h2 class="section-title">Log Penggunaan</h2><p class="section-sub">Catat dan pantau penggunaan perangkat spesifik dari hari ke hari.</p></div>'

    // Form

    +'<div class="form-group"><label class="form-label">Perangkat</label>'
    +'<select class="form-select" id="log-device" required><option value="">Pilih perangkat aktif</option>'

    +'</select></div>'
    +'<div class="form-group"><label class="form-label">Tanggal</label><input class="form-input" id="log-date" type="date" value="'+todayStr()+'" required></div>'
    +'<div class="form-group"><label class="form-label">Durasi (Jam)</label><input class="form-input" id="log-dur" type="number" step="0.5" min="0.5" placeholder="Contoh: 4.5" required></div>'
    +'<div class="info-box info-blue" style="margin-bottom:12px">'+ico('help',14)+'<span>Nilai <strong>kWh & emisi karbon</strong> akan diisi model AI. Data ini dicatat sebagai <em>pending</em>.</span></div>'
    +'<button type="submit" class="btn btn-primary btn-block">'+ico('plus',15)+' Simpan Log</button>'
    +'</form></div></div>'
    // Right
    +'<div class="space-yl">'
    +'<div class="card"><div class="card-header"><div class="card-title">Riwayat 7 Hari Terakhir</div><div class="card-desc">Total kWh per hari dari log tersimpan</div></div>'
    +'<div class="card-content">'
    +(chartData.length>0
      ?'<div class="bar-chart-wrap"><div class="bar-chart-bars">'
        +chartData.map(function(d){
          return '<div class="bar-col"><div class="bar-col-val">'+(d.kwh>0?d.kwh.toFixed(1):'')+'</div>'
            +'<div class="bar-fill" style="height:'+Math.max((d.kwh/maxK)*140,2)+'px;background:'+(d.kwh>0?'#6366f1':'#e2e8f0')+'" title="'+d.label+': '+d.kwh+' kWh"></div></div>';
        }).join('')
        +'</div><div class="bar-chart-labels">'+chartData.map(function(d){return '<div class="bar-lbl">'+d.label+'</div>';}).join('')+'</div></div>'
      :'<div style="padding:40px 0;text-align:center;color:var(--s400);font-size:13px">Belum ada data riwayat</div>'
    )+'</div></div>'
    +'<div class="card"><div class="card-header"><div class="card-title">Tabel Log Terbaru</div><div class="card-desc">Menampilkan 10 log terakhir</div></div>'
    +'<div class="card-content" style="padding:0 0 4px">'
    +(S.logs.length>0

        +[].concat(S.logs).reverse().slice(0,10).map(function(l){

          return '<tr><td><div class="flex items-center gap-2">'+ico('calendar',14)+' '+l.date+'</div></td>'
            +'<td>'+(dev?esc(dev.name):'<span style="color:var(--s400);font-style:italic">Perangkat dihapus</span>')+'</td>'
            +'<td><div class="flex items-center gap-1">'+ico('clock',14)+' '+l.durationHours+' jam</div></td>'
            +'<td>'+(pend?'<span class="badge badge-pending">Menunggu AI</span>'
              :'<span style="color:#4f46e5;font-weight:600">'+l.totalKwh.toFixed(2)+' kWh</span>')+'</td>'
            +'<td>'+(pend?'<span style="color:var(--s400)">—</span>'

}

function htmlRecommendations() {
  var active = S.devices.filter(function(d){return d.status==='active';});
  if(active.length===0) return '<div style="text-align:center;padding:80px 0">'
    +'<span style="color:#e2e8f0">'+ico('zap',56)+'</span>'

  var cats = []; active.forEach(function(d){if(cats.indexOf(d.category)<0)cats.push(d.category);});
  var dynTips = cats.filter(function(c){return TIP_CAT[c];}).map(function(c){return TIP_CAT[c];});
  var allTips = dynTips.concat(TIPS);
  var top3 = [].concat(active).sort(function(a,b){return b.wattage-a.wattage;}).slice(0,3);

    +'<div class="prog-bar"><div class="prog-fill" style="width:'+score+'%"></div></div>'
    +'<p style="font-size:12px;color:rgba(255,255,255,.8)">'+ico('sparkles',14)+' Anda lebih hemat dari 60% pengguna lain!</p></div>'
    +'<div class="card"><div class="card-header"><div class="card-title">'+ico('bulb',16)+' Saran Penghematan</div><div class="card-desc">Disesuaikan dengan perangkat yang terdaftar</div></div>'
    +'<div class="card-content space-y">'

        +'</div></div>';
    }).join('')
    +'</div></div></div>'
    +(top3.length>0
      ?'<div class="card"><div class="card-header"><div class="card-title">'+ico('warn',16)+' Perangkat dengan Daya Terbesar</div><div class="card-desc">Fokus pada perangkat ini untuk dampak penghematan paling signifikan</div></div>'
        +'<div class="card-content"><div class="grid g3">'
        +top3.map(function(d,i){
          return '<div class="top-card"><div class="flex justify-between items-center">'

function htmlToken() {
  var spent = S.tokens.reduce(function(s,t){return s+t.amountRupiah;},0);
  var tKwh  = S.tokens.reduce(function(s,t){return s+t.kwhReceived;},0);
  var latest = S.tokens.length>0?[].concat(S.tokens).sort(function(a,b){return b.date.localeCompare(a.date);})[0]:null;
  var lastKwh = (latest&&latest.kwhReceived)||0;
  var remain = Math.max(0, lastKwh - lastKwh*0.4);
  var pct = lastKwh>0?(remain/lastKwh)*100:0;

  return '<div class="space-yl">'
    +'<div class="section-header"><h2 class="section-title">Token &amp; Pembayaran</h2><p class="section-sub">Catat pembelian token listrik dan pantau riwayat pengeluaran.</p></div>'
    +'<div class="grid gcol12">'
    +'<div class="space-yl">'
    +'<div style="background:linear-gradient(135deg,#2563eb,#4f46e5);color:#fff;border-radius:14px;padding:20px">'
    +'<div style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:#bfdbfe;margin-bottom:4px">'+ico('activity',16)+' Estimasi Sisa Listrik</div>'
    +'<div style="font-size:11px;color:#93c5fd;margin-bottom:16px">Berdasarkan pembelian token terakhir</div>'
    +'<div style="font-size:36px;font-weight:800">'+remain.toFixed(1)+'<span style="font-size:16px;font-weight:400;color:#bfdbfe;margin-left:4px">kWh</span></div>'

function bindLoginEvents() {
  var bb = q('back-btn');
  if(bb) bb.addEventListener('click', function(){goTo('landing');});
  var pt = q('pwd-toggle');
  if(pt) pt.addEventListener('click', function(){
    showPwd = !showPwd;
    var inp = q('l-pwd'); if(inp) inp.type = showPwd?'text':'password';
    pt.innerHTML = ico(showPwd?'eye_off':'eye', 16);
  });
  var sb = q('switch-btn');
  if(sb) sb.addEventListener('click', function(){
    loginMode = !loginMode;
    q('login-title').textContent = loginMode?'Selamat Datang Kembali':'Buat Akun Baru';
    q('login-sub').textContent   = loginMode?'Masukkan username dan password':'Daftar untuk mulai memantau konsumsi listrik';
    q('login-btn').textContent   = loginMode?'Masuk':'Daftar Sekarang';
    q('switch-text').textContent = loginMode?'Belum punya akun?':'Sudah punya akun?';
    q('switch-btn').textContent  = loginMode?'Daftar':'Masuk';
    var e = q('login-err'); if(e) e.classList.add('hidden');
  });
  var lf = q('form-login');
  if(lf) lf.addEventListener('submit', function(e){
    e.preventDefault();
    var username = (qv('l-user')||'').trim();
    var password = qv('l-pwd')||'';
    if(!username||!password){ loginErr('Username dan password harus diisi.'); return; }
    var users = JSON.parse(localStorage.getItem('bw_users')||'{}');
    if(loginMode){
      if(users[username]&&users[username]===password){
        S.user = {username:username, email:username.toLowerCase()+'@example.com', energySavingScore:85};
        saveState(); goTo('app','dashboard');
      } else { loginErr('Username atau password salah.'); }
    } else {
      if(users[username]){ loginErr('Username sudah terdaftar, silakan masuk.'); return; }
      users[username] = password;
      localStorage.setItem('bw_users', JSON.stringify(users));
      S.user = {username:username, email:username.toLowerCase()+'@example.com', energySavingScore:85};
      saveState(); goTo('app','dashboard');
    }
  });
}
function loginErr(msg) {
  var e = q('login-err'); if(!e) return;
  e.innerHTML = msg; e.className = 'err-box';
}

// ═══════════════════════════════════
// FORM BINDINGS (App sections)
// ═══════════════════════════════════
function bindForms() {
  // Device form
  var df = q('form-device');
  if(df) df.addEventListener('submit', function(e){
    e.preventDefault();
    var typeEl = q('dev-type');
    var isCustom = typeEl.value==='custom';
    var name = isCustom?(qv('dev-custom')||'').trim():typeEl.value;
    var watt = parseFloat(qv('dev-watt')||'0');
    var hours = parseFloat(qv('dev-hours')||'0');
    if(!name||!watt||!hours) return;
    var preset = PRESETS[typeEl.value];
    var category = isCustom?'Lainnya':(preset?preset.cat:'Lainnya');
    S.devices.push({
      id:uid(), name:name,
      brand:(qv('dev-brand')||'').trim()||'Unbranded',
      model:(qv('dev-model')||'').trim()||'Unknown',
      category:category, wattage:watt, hoursPerDay:hours,
      year:parseInt(qv('dev-year')||'0')||undefined,
      status:'active'
    });
    saveState(); renderContent();
  });
  // Log form
  var lf = q('form-log');
  if(lf) lf.addEventListener('submit', function(e){
    e.preventDefault();
    var devId = qv('log-device'), date = qv('log-date'), dur = parseFloat(qv('log-dur')||'0');
    if(!devId||!date||!dur) return;
    S.logs.push({id:uid(), deviceId:devId, date:date, durationHours:dur, totalKwh:0, carbonEmission:0});
    saveState(); renderContent();
  });
  // Token form
  var tf = q('form-token');
  if(tf) tf.addEventListener('submit', function(e){
    e.preventDefault();
    var date = qv('tok-date');
    var amt = parseInt((qv('tok-amount')||'').replace(/[^0-9]/g,''))||0;
    var kwh = parseFloat(qv('tok-kwh')||'0')||0;
    if(!date||!amt) return;
    S.tokens.push({id:uid(), date:date, amountRupiah:amt, kwhReceived:kwh});
    saveState(); renderContent();
  });
}

// ═══════════════════════════════════
// ACTIONS
// ═══════════════════════════════════
function toggleDevice(id) {
  var d = S.devices.filter(function(x){return x.id===id;})[0]; if(!d) return;
  d.status = d.status==='active'?'inactive':'active';
  saveState(); renderDeviceList();
}
function deleteDevice(id) {
  if(!confirm('Hapus perangkat ini?')) return;
  S.devices = S.devices.filter(function(x){return x.id!==id;});
  saveState(); renderDeviceList();
}
function openEditProfile() {
  var u = S.user; if(!u) return;
  showModal('Edit Profil',
    '<form id="form-profile">'
    +'<div class="form-group"><label class="form-label">'+ico('user',13)+' Username</label>'
    +'<input class="form-input" id="ep-user" value="'+esc(u.username)+'" required></div>'
    +'<div class="form-group"><label class="form-label">'+ico('mail',13)+' Email</label>'
    +'<input class="form-input" id="ep-email" type="email" value="'+esc(u.email)+'" required></div>'
    +'<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">'
    +'<button type="button" class="btn btn-outline" onclick="closeModal()">Batal</button>'
    +'<button type="submit" class="btn btn-primary">'+ico('check',15)+' Simpan</button>'
    +'</div></form>');
  q('form-profile').addEventListener('submit', function(e){
    e.preventDefault();
    var nu = (qv('ep-user')||'').trim(), ne = (qv('ep-email')||'').trim();
    if(!nu||!ne) return;
    S.user.username=nu; S.user.email=ne;
    saveState(); closeModal(); renderContent(); renderSidebar(); renderMobHeader();
  });
}
function handleLogout() {
  S.user = null;
  localStorage.removeItem('bw_user');
  localStorage.removeItem('bw_devices');
  localStorage.removeItem('bw_logs');
  localStorage.removeItem('bw_tokens');
  S.devices = DEMO_DEVICES.map(function(x){return Object.assign({},x);});
  S.logs    = DEMO_LOGS.map(function(x){return Object.assign({},x);});
  S.tokens  = DEMO_TOKENS.map(function(x){return Object.assign({},x);});
  S.page = 'landing';
  render();
}

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
loadState();
loginMode = true;
render();
</script>
